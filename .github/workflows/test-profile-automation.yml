name: 🧪 Profile Automation Tests

on:
  push:
    branches: [main]
    paths:
      - .github/scripts/**
      - tests/**
      - profile.config.json
      - .github/workflows/test-profile-automation.yml
  pull_request:
    branches: [main]
    paths:
      - .github/scripts/**
      - tests/**
      - profile.config.json
      - .github/workflows/test-profile-automation.yml
  workflow_dispatch:

permissions:
  contents: read


jobs:
  unit-tests:
    name: Python automation tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: ✅ Validate JSON config
        run: python -m json.tool profile.config.json > /tmp/profile.config.validated.json

      - name: 🔎 Compile scripts
        run: python -m compileall .github/scripts tests

      - name: 🧪 Run unit tests
        run: python -m unittest discover -s tests -v
