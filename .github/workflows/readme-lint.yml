name: 🧼 README Lint

on:
  push:
    branches: [main]
    paths:
      - README.md
      - assets/**
      - .github/scripts/readme_lint.py
      - .github/workflows/readme-lint.yml
  pull_request:
    branches: [main]
    paths:
      - README.md
      - assets/**
      - .github/scripts/readme_lint.py
      - .github/workflows/readme-lint.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  readme-lint:
    name: Check README professionalism
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 🧼 Lint README
        run: python .github/scripts/readme_lint.py
