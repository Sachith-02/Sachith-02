name: Trigger Profile README Update

on:
  push:
    branches: [main]
  release:
    types: [published, edited]
  workflow_dispatch:

jobs:
  trigger-profile-update:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Sachith-02 profile automation
        env:
          PROFILE_UPDATE_TOKEN: ${{ secrets.PROFILE_UPDATE_TOKEN }}
        run: |
          if [ -z "$PROFILE_UPDATE_TOKEN" ]; then
            echo "PROFILE_UPDATE_TOKEN is not configured. Skipping profile dispatch."
            exit 0
          fi

          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PROFILE_UPDATE_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Sachith-02/Sachith-02/dispatches \
            -d '{"event_type":"profile-update","client_payload":{"source_repository":"'"${GITHUB_REPOSITORY}"'"}}'
