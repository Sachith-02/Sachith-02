name: 🤖 Advanced Profile Automation

on:
  push:
    branches: [main]
    paths:
      - README.md
      - profile.config.json
      - .github/scripts/update_profile.py
      - .github/workflows/update-profile.yml
  schedule:
    # Daily refresh at 00:15 UTC
    - cron: "15 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-readme-update
  cancel-in-progress: true

jobs:
  update-profile:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 🧪 Validate configuration JSON
        run: python -m json.tool profile.config.json > /tmp/profile.config.validated.json

      - name: 🔄 Regenerate dynamic README sections
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python .github/scripts/update_profile.py

      - name: ✅ Show changed files
        run: git status --short

      - name: 💾 Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No README changes to commit."
          else
            git commit -m "🤖 Auto-update advanced profile README [skip ci]"
            git push
          fi
