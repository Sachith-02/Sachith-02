name: 🛡️ Profile Quality Gate

on:
  push:
    branches: [main]
    paths:
      - README.md
      - profile.config.json
      - .github/scripts/**
      - .github/workflows/**
      - docs/**
      - assets/**
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  profile-quality:
    name: Validate README automation health
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: ✅ Validate config format
        run: python -m json.tool profile.config.json > /tmp/profile.config.validated.json

      - name: 🔎 Compile automation scripts
        run: python -m compileall .github/scripts tests

      - name: 🧪 Run unit tests
        run: python -m unittest discover -s tests -v

      - name: 🩺 Check profile structure
        run: python .github/scripts/profile_health_check.py --check-only
