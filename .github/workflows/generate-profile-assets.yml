name: 🎨 Generate Profile Assets

on:
  schedule:
    - cron: "35 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-assets
  cancel-in-progress: true

jobs:
  generate-assets:
    name: Generate README SVG assets
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ github.token }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: 🎨 Generate assets
        run: python .github/scripts/generate_profile_assets.py

      - name: 💾 Commit asset updates
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          if git diff --staged --quiet; then
            echo "No asset changes."
          else
            git commit -m "🎨 Regenerate profile SVG assets [skip ci]"
            git push
          fi
